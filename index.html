<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ CYBER_DECRYPTOR // BREACH_THE_PASSWORD</title>
    <style>
        /* ESTILO HACKER / CYBERPUNK */
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #0a0a12;
            color: #39ff14; /* Verde Neon */
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-shadow: 0 0 5px rgba(57, 255, 20, 0.5);
        }

        .container {
            background: #121225;
            border: 2px solid #39ff14;
            padding: 30px;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.2), inset 0 0 10px rgba(57, 255, 20, 0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }

        /* Detalhe estético de "terminal" */
        .container::before {
            content: "SYS_STATUS: ACTIVE";
            position: absolute;
            top: 4px;
            left: 8px;
            font-size: 10px;
            color: #bc13fe; /* Roxo Neon */
        }

        h1, h2, h3 { 
            color: #fff; 
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 8px #bc13fe;
        }

        p strong {
            color: #bc13fe;
            text-shadow: 0 0 5px #bc13fe;
        }

        input {
            padding: 12px;
            font-size: 20px;
            width: 80%;
            margin: 15px 0;
            background-color: #05050a;
            border: 1px solid #bc13fe;
            color: #fff;
            border-radius: 4px;
            text-align: center;
            letter-spacing: 4px;
            font-family: 'Courier New', Courier, monospace;
            box-shadow: 0 0 8px rgba(188, 19, 254, 0.3);
        }

        input:focus {
            border-color: #39ff14;
            box-shadow: 0 0 12px rgba(57, 255, 20, 0.6);
            outline: none;
        }

        /* BOTÕES ESTILO GAME */
        button {
            padding: 12px 24px;
            font-size: 14px;
            background-color: transparent;
            color: #39ff14;
            border: 2px solid #39ff14;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 0 8px rgba(57, 255, 20, 0.3);
        }

        button:hover { 
            background-color: #39ff14;
            color: #0a0a12;
            box-shadow: 0 0 20px #39ff14;
        }

        .danger-btn { 
            border-color: #ff3131; 
            color: #ff3131;
            box-shadow: 0 0 8px rgba(255, 49, 49, 0.3);
            margin-top: 25px;
        }
        
        .danger-btn:hover { 
            background-color: #ff3131; 
            color: #fff;
            box-shadow: 0 0 20px #ff3131;
        }
        
        /* SLOTS DA SENHA */
        .pista {
            font-size: 36px;
            font-weight: bold;
            letter-spacing: 12px;
            margin: 20px 0;
            color: #39ff14;
            background: #05050a;
            padding: 15px;
            border-radius: 4px;
            display: inline-block;
            border: 1px dashed #39ff14;
        }
        
        /* TABELA DE LOGS (HISTÓRICO) */
        .historico-section {
            margin-top: 30px;
            border-top: 1px solid #bc13fe;
            padding-top: 20px;
            text-align: left;
        }

        .tabela-historico {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 13px;
            background-color: #05050a;
        }

        .tabela-historico th, .tabela-historico td {
            border: 1px solid #222244;
            padding: 10px;
            text-align: center;
        }

        .tabela-historico th {
            background-color: #121225;
            color: #bc13fe;
            text-transform: uppercase;
        }

        .tabela-historico tr:hover {
            background-color: #0f0f22;
        }

        /* BADGES DO HISTÓRICO */
        .badge-acerto {
            color: #39ff14;
            font-weight: bold;
        }
        .badge-erro {
            color: #ff3131;
        }
        .badge-vitoria {
            color: #ff007f;
            font-weight: bold;
            animation: piscar 1s infinite;
        }

        @keyframes piscar {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        ul { list-style: none; padding: 0; }
        li { 
            padding: 10px; 
            background: #05050a; 
            margin: 8px 0; 
            border-left: 3px solid #bc13fe; 
            text-align: left;
            color: #fff;
        }
    </style>
</head>
<body>

    <div id="tela-cadastro" class="container">
        <h2>⚡ INITIALIZE_PLAYERS //</h2>
        <input type="text" id="nome" placeholder="CODINOME_DO_ALUNO"><br>
        <input type="password" id="senha" maxlength="4" placeholder="SENHA_DE_4_DIGITOS_UNICOS"><br>
        <button onclick="cadastrarJogador()">> INSERIR_NA_REDE</button>
        
        <h3>AGENTES CONECTADOS:</h3>
        <ul id="lista-jogadores"></ul>
        <button id="btn-iniciar" style="display:none; margin-top: 15px;" onclick="iniciarJogo()">> INICIAR_INVASAO()</button>
    </div>

    <div id="tela-jogo" class="container" style="display:none;">
        <h2 id="turno-titulo">HACKER_ATIVO: X</h2>
        <p>FIREWALL ALVO: <strong id="alvo-nome">Y</strong></p>
        
        <input type="text" id="chute" maxlength="4" placeholder="DIGITE_4_NUMEROS"><br>
        <button onclick="testarChute()">[ INJECT_BYPASS ]</button>

        <div>
            <div id="resultado-pista" class="pista">_ _ _ _</div>
        </div>
        <p id="feedback-mensagem" style="min-height: 20px; color: #fff; font-size: 14px;"></p>

        <div class="historico-section">
            <h3>📂 ACCESS_LOGS //</h3>
            <div style="max-height: 220px; overflow-y: auto;">
                <table class="tabela-historico">
                    <thead>
                        <tr>
                            <th>Hacker</th>
                            <th>Alvo</th>
                            <th>Payload</th>
                            <th>Resultado</th>
                        </tr>
                    </thead>
                    <tbody id="corpo-historico">
                        </tbody>
                </table>
            </div>
        </div>

        <button class="danger-btn" onclick="reiniciarJogo()">⚠️ WIPE_ALL_DATA (RESET)</button>
    </div>

    <script>
        let jogadores = JSON.parse(localStorage.getItem('jogadores')) || [];
        let indexAtacante = parseInt(localStorage.getItem('indexAtacante')) || 0;
        let indexAlvo = parseInt(localStorage.getItem('indexAlvo')) || 1;
        let historico = JSON.parse(localStorage.getItem('historico_cyber')) || [];

        window.onload = function() {
            if (jogadores.length >= 2 && localStorage.getItem('jogoIniciado') === 'true') {
                mostrarTelaJogo();
            } else {
                atualizarListaCadastro();
            }
        };

        function validarSenha(senha) {
            if (senha.length !== 4 || isNaN(senha)) return false;
            return (new Set(senha)).size === 4;
        }

        function cadastrarJogador() {
            const nome = document.getElementById('nome').value.trim();
            const senha = document.getElementById('senha').value.trim();

            if (!nome || !senha) return alert("ERRO: Campos vazios detectados.");
            if (!validarSenha(senha)) return alert("ERRO: A senha deve conter 4 dígitos numéricos e NÃO PODE REPETIR.");

            jogadores.push({ nome, senha });
            localStorage.setItem('jogadores', JSON.stringify(jogadores));

            document.getElementById('nome').value = '';
            document.getElementById('senha').value = '';
            atualizarListaCadastro();
        }

        function atualizarListaCadastro() {
            const lista = document.getElementById('lista-jogadores');
            lista.innerHTML = '';
            jogadores.forEach(j => lista.innerHTML += `<li>> ONLINE: ${j.nome} // crypt_key_secured</li>`);

            if (jogadores.length >= 2) {
                document.getElementById('btn-iniciar').style.display = 'inline-block';
            }
        }

        function iniciarJogo() {
            localStorage.setItem('jogoIniciado', 'true');
            indexAtacante = 0;
            indexAlvo = 1;
            historico = [];
            localStorage.setItem('indexAtacante', indexAtacante);
            localStorage.setItem('indexAlvo', indexAlvo);
            localStorage.setItem('historico_cyber', JSON.stringify(historico));
            mostrarTelaJogo();
        }

        function mostrarTelaJogo() {
            document.getElementById('tela-cadastro').style.display = 'none';
            document.getElementById('tela-jogo').style.display = 'block';
            
            document.getElementById('turno-titulo').innerText = `⚡ ATACANTE: ${jogadores[indexAtacante].nome}`;
            document.getElementById('alvo-nome').innerText = jogadores[indexAlvo].nome;
            
            document.getElementById('chute').value = '';
            document.getElementById('resultado-pista').innerText = '_ _ _ _';
            document.getElementById('feedback-mensagem').innerText = '';
            
            atualizarTabelaHistorico();
        }

        function testarChute() {
            const chute = document.getElementById('chute').value.trim();
            const senhaVerdadeira = jogadores[indexAlvo].senha;

            if (chute.length !== 4 || isNaN(chute)) return alert("SISTEMA: Insira exatamente 4 algarismos.");

            let resultadoVisual = "";
            let acertados = [];
            let qtdAcertos = 0;

            for (let i = 0; i < 4; i++) {
                if (chute[i] === senhaVerdadeira[i]) {
                    resultadoVisual += chute[i] + " ";
                    acertados.push(chute[i]);
                    qtdAcertos++;
                } else {
                    resultadoVisual += "_ ";
                }
            }

            document.getElementById('resultado-pista').innerText = resultadoVisual;

            let badgeHTML = "";
            if (qtdAcertos === 4) {
                badgeHTML = `<span class="badge-vitoria">SYSTEM_BREACH!</span>`;
                document.getElementById('feedback-mensagem').innerHTML = `🟢 ACESSO CONCEDIDO: ${jogadores[indexAtacante].nome} quebrou o terminal de ${jogadores[indexAlvo].nome}!`;
            } else if (qtdAcertos > 0) {
                badgeHTML = `<span class="badge-acerto">MATCH: ${acertados.join(',')}</span>`;
                document.getElementById('feedback-mensagem').innerText = `Pistas encontradas na memória decimal! Redirecionando...`;
            } else {
                badgeHTML = `<span class="badge-erro">MISS</span>`;
                document.getElementById('feedback-mensagem').innerText = `Falha no bypass. Passando terminal...`;
            }

            historico.unshift({
                autor: jogadores[indexAtacante].nome,
                alvo: jogadores[indexAlvo].nome,
                chute: chute,
                resultado: badgeHTML
            });

            localStorage.setItem('historico_cyber', JSON.stringify(historico));
            atualizarTabelaHistorico();

            setTimeout(proximoTurno, qtdAcertos === 4 ? 4000 : 2500);
        }

        function atualizarTabelaHistorico() {
            const corpo = document.getElementById('corpo-historico');
            corpo.innerHTML = '';
            
            historico.forEach(item => {
                corpo.innerHTML += `
                    <tr>
                        <td><strong>${item.autor}</strong></td>
                        <td>${item.alvo}</td>
                        <td><code>${item.chute}</code></td>
                        <td>${item.resultado}</td>
                    </tr>
                `;
            });
        }

        function proximoTurno() {
            indexAtacante = (indexAtacante + 1) % jogadores.length;
            indexAlvo = (indexAtacante + 1) % jogadores.length;

            localStorage.setItem('indexAtacante', indexAtacante);
            localStorage.setItem('indexAlvo', indexAlvo);
            mostrarTelaJogo();
        }

        function reiniciarJogo() {
            if (confirm("Deseja apagar os registros da rede e reiniciar o sistema?")) {
                localStorage.clear();
                jogadores = [];
                historico = [];
                indexAtacante = 0;
                indexAlvo = 1;
                document.getElementById('tela-jogo').style.display = 'none';
                document.getElementById('tela-cadastro').style.display = 'block';
                atualizarListaCadastro();
            }
        }
    </script>
</body>
</html>
